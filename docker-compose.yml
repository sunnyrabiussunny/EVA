version: "3.9"

services:
  backend:
    build: ./backend
    container_name: eva-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - AI_PROVIDER=${AI_PROVIDER:-auto}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build: ./frontend
    container_name: eva-frontend
    restart: unless-stopped
    ports:
      - "3737:80"
    depends_on:
      - backend

networks:
  default:
    name: eva-network
